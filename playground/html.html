<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>HTML Playground</title>
  </head>
  <body>
    <header>
      <h1>Heading</h1>
      <nav>
        <a href="#a">Link A</a>
        <a href="#b">Link B</a>
      </nav>
    </header>
    <main>
      <section id="a">
        <h2>Section A</h2>
        <p>Text <strong>bold</strong> and <em>italic</em> with <code>inline</code> code.</p>
      </section>
      <section id="b">
        <h2>Section B</h2>
        <ul>
          <li>Item 1</li>
          <li>Item 2</li>
        </ul>
      </section>
      <form>
        <input type="text" name="name" />
        <button type="submit">Submit</button>
      </form>
    </main>
    <footer>Footer</footer>
  </body>
</html>
